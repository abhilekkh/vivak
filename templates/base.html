<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VivaK</title>
    <link rel="icon"
      href="{{ url_for('static', filename='favicon.ico') }}">

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <header class="navbar navbar-expand-lg">
      <div class="container-fluid px-3 px-lg-5">
        <a class="navbar-brand d-flex align-items-center gap-3" href="/">
          <img
            src="{{ url_for('static', filename='logo3.png') }}"
            alt="VivaK Logo"
            class="navbar-logo"
          />

          <span class="brand-name"> VIVA<span>K</span> </span>
        </a>

        <nav class="navbar-nav ms-auto d-flex flex-row gap-4">
          <a class="nav-link" href="/">Home</a>

          <a class="nav-link" href="/topanime">Top Anime</a>

          <a class="nav-link" href="/recentupdates">Recent Updates</a>
        </nav>
      </div>
    </header>

    {% block content %} {% endblock %}
    <footer class="footer">
      <p>© 2026 VivaK • Built by Vivekanand & Abhilekkh Krishna</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
